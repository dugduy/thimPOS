<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThimPOS - Make Order</title>

<style>
/* ===== PAGE WRAPPER (IMPORTANT) ===== */
.page {
    padding: 10px; /* Giảm padding một chút cho mobile */
    max-width: 1400px;
    margin: 0 auto;
}

/* layout - MOBILE FIRST APPROACH */
.container {
    display: flex;
    flex-direction: column; /* Stack dọc trên mobile */
    gap: 15px;
    width: 100%;
}

@media (min-width: 992px) {
    .container {
        display: grid;
        grid-template-columns: 1.4fr 1fr; /* Chia cột trên Desktop */
        gap: 20px;
    }
}

.box {
    border: 1px solid #e5e7eb;
    padding: 15px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

/* SEARCH & CATEGORY BAR */
.control-panel {
    margin-bottom: 15px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.quick-bar {
    display: flex;
    gap: 8px;
}

.category-bar {
    display: flex;
    gap: 8px;
    overflow-x: auto; /* Cho phép vuốt ngang category trên mobile */
    padding: 5px 0;
    white-space: nowrap;
    -webkit-overflow-scrolling: touch;
}

/* Ẩn scrollbar nhưng vẫn scroll được để giao diện sạch hơn */
.category-bar::-webkit-scrollbar { display: none; }

.btn-cat {
    padding: 8px 16px;
    border: 1px solid #ddd;
    background: white;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    transition: 0.2s;
    flex-shrink: 0; /* Không bị co lại trong flex-scroll */
}

.btn-cat:hover { background: #f0f0f0; }
.btn-cat.active {
    background: #3498db;
    color: white;
    border-color: #3498db;
}

input {
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    flex-grow: 1;
    font-size: 16px; /* Tránh zoom tự động trên iOS */
}

/* PRODUCT GRID */
.product-grid {
    display: grid;
    /* Tự động điều chỉnh số cột dựa trên kích thước màn hình */
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
    gap: 10px;
    min-height: 200px;
}

@media (min-width: 600px) {
    .product-grid { gap: 15px; }
}

.product-card {
    border: 1px solid #eee;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.2s;
    background: white;
    position: relative;
    display: flex;
    flex-direction: column;
}

.product-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.product-img {
    width: 100%;
    aspect-ratio: 1 / 1; /* Giữ ảnh luôn vuông */
    object-fit: cover;
    background: #fdfdfd;
}

.product-info {
    padding: 8px;
    flex-grow: 1;
}

.product-name {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.3;
    height: 34px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
}

.product-price {
    color: #e53935;
    font-weight: bold;
    margin-top: 5px;
    font-size: 14px;
}

.product-cat-tag {
    font-size: 10px;
    color: #888;
    text-transform: uppercase;
    margin-bottom: 2px;
}

/* CART TABLE - Tối ưu cho màn hình hẹp */
table {
    width: 100%;
    border-collapse: collapse;
}

td, th {
    border-bottom: 1px solid #eee;
    padding: 10px 4px;
    text-align: left;
    font-size: 14px;
}

.cart-qty-input {
    width: 45px;
    padding: 6px 4px;
    text-align: center;
    border: 1px solid #ddd;
    border-radius: 4px;
}

button {
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 4px;
    border: 1px solid #ddd;
    touch-action: manipulation; /* Tối ưu phản hồi chạm */
}

.btn-primary { background: #2ecc71; color: white; border: none; font-weight: bold; }
.btn-danger { background: #e74c3c; color: white; border: none; }

.cart-total {
    font-size: 18px;
    font-weight: bold;
    margin-top: 15px;
    text-align: right;
    color: #2c3e50;
}

/* TOAST */
#toast-container {
    position: fixed;
    top: 20px; /* Đưa lên cao hơn trên mobile */
    right: 10px;
    left: 10px; /* Trải rộng trên mobile */
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
    z-index: 9999;
    pointer-events: none;
}

@media (min-width: 600px) {
    #toast-container { left: auto; width: 300px; }
}

.toast {
    width: 100%;
    max-width: 300px;
    padding: 12px;
    border-radius: 8px;
    color: white;
    font-size: 14px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    animation: slideIn 0.2s ease;
    pointer-events: auto;
}

.toast.success { background: #2ecc71; }
.toast.error { background: #e74c3c; }
.toast.info { background: #3498db; }

@keyframes slideIn {
    from { transform: translateY(-20px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
}

/* CONFIRM BOX */
#confirm-box {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
    z-index:9999;
    align-items:center;
    justify-content:center;
    padding: 20px;
}
</style>

</head>
<body>

<div class="page">

<div id="toast-container"></div>

<!-- CONFIRM -->
<div id="confirm-box">
    <div style="background:white; padding:20px; border-radius:10px; width:100%; max-width:350px; box-sizing: border-box;">
        <div id="confirm-text" style="margin-bottom:15px; font-weight: 500;"></div>
        <div style="display:flex; justify-content:flex-end; gap:10px;">
            <button onclick="confirmNo()">Hủy</button>
            <button class="btn-danger" onclick="confirmYes()">Xóa</button>
        </div>
    </div>
</div>

<h2 style="margin-top: 0; font-size: 1.5rem;">🧾 ThimPOS</h2>

<div class="control-panel">
    <div class="quick-bar">
        <input id="search" type="text" placeholder="Tìm tên sản phẩm...">
        <button onclick="searchProducts()">Tìm</button>
        <button onclick="loadProducts()">Tất cả</button>
    </div>

    <div id="categoryBar" class="category-bar"></div>
</div>

<div class="container">

    <!-- KHỐI SẢN PHẨM -->
    <div class="box">
        <h3 id="displayTitle" style="margin-top:0;">📦 Sản phẩm</h3>
        <div id="productList" class="product-grid"></div>
    </div>

    <!-- KHỐI GIỎ HÀNG -->
    <div class="box" style="position: sticky; top: 10px; align-self: start;">
        <h3 style="margin-top:0;">🛒 Đơn hiện tại</h3>

        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Sản phẩm</th>
                        <th style="width: 50px;">SL</th>
                        <th style="text-align: right;">Giá</th>
                        <th style="width: 30px;"></th>
                    </tr>
                </thead>
                <tbody id="cart"></tbody>
            </table>
        </div>

        <div class="cart-total" id="total">Tổng: 0đ</div>

        <div style="margin-top:20px; display: flex; gap: 10px; justify-content: flex-end;">
            <button class="btn-danger" onclick="clearCart()">🧹 Xóa</button>
            <button class="btn-primary" onclick="submitOrder()" style="padding: 10px 20px; flex-grow: 1;">💰 THANH TOÁN</button>
        </div>
    </div>

</div>

</div>

<script>
// --- CONFIG & STATE ---
const API_PRODUCTS = "/api/products";
const API_ORDERS = "/api/orders";

let productCache = new Map();
let cart = new Map();
let currentCategory = "All";
let confirmCallback = null;

// --- UI HELPERS ---
function showConfirm(message, onYes) {
    document.getElementById("confirm-text").innerText = message;
    document.getElementById("confirm-box").style.display = "flex";
    confirmCallback = onYes;
}

function confirmYes() {
    document.getElementById("confirm-box").style.display = "none";
    if (confirmCallback) confirmCallback();
}

function confirmNo() {
    document.getElementById("confirm-box").style.display = "none";
}

function toast(message, type = "info", timeout = 2500) {
    const container = document.getElementById("toast-container");
    const div = document.createElement("div");
    div.className = `toast ${type}`;
    div.innerText = message;
    container.appendChild(div);

    setTimeout(() => {
        div.style.opacity = "0";
        div.style.transform = "translateY(-10px)";
        div.style.transition = "0.2s";
        setTimeout(() => div.remove(), 200);
    }, timeout);
}

// --- DATA FETCHING ---
async function fetchJSON(url) {
    try {
        const res = await fetch(url);
        if (!res.ok) return null;
        return await res.json();
    } catch {
        return null;
    }
}

// --- PRODUCT LOGIC ---
async function loadProducts() {
    const data = await fetchJSON(`${API_PRODUCTS}?limit=200&offset=0&active_only=true`);
    if (!data) return;

    productCache.clear();
    data.data.forEach(p => productCache.set(p.id, p));

    renderCategoryBar();
    filterByCategory("All");
    toast("Đã cập nhật danh sách", "info");
}

function renderCategoryBar() {
    const bar = document.getElementById("categoryBar");
    const categories = ["All", ...new Set([...productCache.values()].map(p => p.category))];

    bar.innerHTML = categories.map(cat => `
        <button class="btn-cat ${currentCategory === cat ? 'active' : ''}" 
                onclick="filterByCategory('${cat}')">
            ${cat}
        </button>
    `).join('');
}

function filterByCategory(cat) {
    currentCategory = cat;
    renderCategoryBar();

    const allItems = [...productCache.values()];
    const filtered = cat === "All" 
        ? allItems 
        : allItems.filter(p => p.category === cat);

    document.getElementById("displayTitle").innerText = `📦 ${cat}`;
    renderProducts(filtered);
}

async function searchProducts() {
    const q = document.getElementById("search").value;
    if(!q) { loadProducts(); return; }

    const data = await fetchJSON(
        `${API_PRODUCTS}/search?q=${encodeURIComponent(q)}&active_only=true`
    );

    if (data) {
        renderProducts(data.data);
        document.getElementById("displayTitle").innerText = `🔍 Kết quả: "${q}"`;
    }
}

function renderProducts(products) {
    const container = document.getElementById("productList");
    container.innerHTML = "";

    products.forEach(p => {
        const div = document.createElement("div");
        div.className = "product-card";
        div.onclick = () => addToCart(p.id);

        div.innerHTML = `
            ${p.image_url
                ? `<img class="product-img" src="${p.image_url}" loading="lazy" alt="${p.name}">`
                : `<div class="product-img" style="display:flex;align-items:center;justify-content:center;background:#eee;color:#ccc;">No Img</div>`}
            <div class="product-info">
                <div class="product-cat-tag">${p.category}</div>
                <div class="product-name">${p.name}</div>
                <div class="product-price">${p.price.toLocaleString()}đ</div>
            </div>
        `;
        container.appendChild(div);
    });
}

// --- CART LOGIC ---
function addToCart(id) {
    const p = productCache.get(id);
    if (!p) return;

    if (!cart.has(id)) cart.set(id, { product: p, quantity: 1 });
    else cart.get(id).quantity++;

    renderCart();
    toast(`+ ${p.name}`, "success", 1000);
}

function renderCart() {
    const tbody = document.getElementById("cart");
    tbody.innerHTML = "";
    let total = 0;

    cart.forEach((item, id) => {
        const lineTotal = item.quantity * item.product.price;
        total += lineTotal;

        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>
                <div style="font-weight:bold; line-height:1.2;">${item.product.name}</div>
                <div style="font-size:10px;color:#888;">ID: ${id}</div>
            </td>
            <td>
                <input type="number" class="cart-qty-input" value="${item.quantity}" min="1"
                    onchange="updateQty(${id}, this.value)">
            </td>
            <td style="text-align:right; font-weight:500;">${lineTotal.toLocaleString()}</td>
            <td style="text-align:right;">
                <button onclick="removeItem(${id})" style="color:#e74c3c;border:none;background:none;font-size:18px;padding:0 5px;">✕</button>
            </td>
        `;
        tbody.appendChild(tr);
    });

    document.getElementById("total").innerText = "Tổng: " + total.toLocaleString() + "đ";
}

function updateQty(id, qty) {
    qty = parseInt(qty);
    if (isNaN(qty) || qty <= 0) return removeItem(id);
    if (cart.has(id)) {
        cart.get(id).quantity = qty;
        renderCart();
    }
}

function removeItem(id) {
    cart.delete(id);
    renderCart();
}

function clearCart() {
    if(cart.size === 0) return;

    showConfirm("Xóa toàn bộ giỏ hàng?", () => {
        cart.clear();
        renderCart();
        toast("Đã dọn dẹp giỏ hàng", "info");
    });
}

// --- ORDER SUBMISSION ---
async function submitOrder() {
    if (cart.size === 0) {
        toast("Giỏ hàng đang trống", "error");
        return;
    }

    const items = [];
    cart.forEach((v, id) => items.push({ product_id: id, quantity: v.quantity }));

    try {
        const res = await fetch(API_ORDERS, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ items })
        });

        const data = await res.json().catch(() => null);

        if (res.ok) {
            toast(`Thành công! Đơn #${data.id}`, "success");
            cart.clear();
            renderCart();
        } else {
            toast(data?.error || "Lỗi tạo đơn", "error");
        }
    } catch {
        toast("Mất kết nối server", "error");
    }
}

// --- INIT ---
document.addEventListener("DOMContentLoaded", () => {
    loadProducts();
});
</script>

<link rel="stylesheet" href="/thimpos.css">
<script src="/thimpos.js" defer></script>

</body>
</html>
